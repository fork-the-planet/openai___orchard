version: 2
project_name: orchard

before:
  hooks:
    - go mod download

builds:
  - main: cmd/orchard/main.go
    ldflags: >
      -X github.com/cirruslabs/orchard/internal/version.Version={{.Version}}
      -X github.com/cirruslabs/orchard/internal/version.Commit={{.ShortCommit}}
      -B gobuildid
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binary
    formats:
      - binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
  - id: regular
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

release:
  prerelease: auto

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"

dockers_v2:
  - images:
      - ghcr.io/openai/orchard
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    disable: "{{ .IsSnapshot }}"

brews:
  - name: orchard
    directory: Formula
    ids:
      - regular
    repository:
      owner: openai
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      branch: "orchard-{{ .Version }}"
      pull_request:
        enabled: true
    install: |
      bin.install "orchard"
      generate_completions_from_executable(bin/"orchard", "completion")
    caveats: See the Github repository for more information
    homepage: https://github.com/openai/orchard
    description: Orchestrator for running Tart Virtual Machines on a cluster of Apple Silicon devices
    skip_upload: auto
